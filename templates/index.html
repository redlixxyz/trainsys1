<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Train Config</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {font-family: Arial, Helvetica, sans-serif; background:#fff; color:#222}
    .card{max-width:520px;margin:80px auto;padding:24px;border-radius:8px;border:1px solid #eee}
    label{display:block;margin-bottom:8px}
    select,input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:6px}
    button{padding:10px 14px;border-radius:6px;border:none;background:#111;color:#fff}
  </style>
</head>
<body>
  <div class="card">
    <h2>Train Configuration</h2>
    <form method="POST" id="wagons-form">
      <label>Select number of wagons</label>
      <div style="display:flex;align-items:center;gap:18px;margin-top:12px">
        <button type="button" class="counter-btn" id="dec">−</button>
        <div class="counter-display" id="counter">3</div>
        <button type="button" class="counter-btn" id="inc">+</button>
        <input type="range" min="1" max="20" value="3" id="wagon-range" class="range-input" />
      </div>
      <input type="hidden" name="wagons" id="wagons-input" value="3" />
      <div style="margin-top:18px;display:flex;gap:12px;align-items:center">
        <button class="primary-btn" type="submit">Continue</button>
        <a href="/" class="ghost-btn">Reset</a>
      </div>
    </form>
    <div style="margin-top:22px">
      <h4 style="margin:0 0 8px 0">Preview</h4>
      <div class="train-preview" id="preview-row"></div>
    </div>

  <script>
    const dec = document.getElementById('dec');
    const inc = document.getElementById('inc');
    const display = document.getElementById('counter');
    const range = document.getElementById('wagon-range');
    const hidden = document.getElementById('wagons-input');
    const preview = document.getElementById('preview-row');
    function renderPreview(n){
      preview.innerHTML='';
      for(let i=1;i<=n;i++){
        const w = document.createElement('div'); w.className='wagon';
        const doors = document.createElement('div'); doors.className='doors';
        for(let d=0;d<4;d++){ const dd=document.createElement('div'); dd.className='door'; dd.textContent='C'; doors.appendChild(dd); }
        w.appendChild(doors);
        const foot=document.createElement('div'); foot.style.position='absolute';foot.style.bottom='8px';foot.style.left='12px';foot.style.fontSize='13px';foot.style.color='#555'; foot.textContent='W '+i; w.appendChild(foot);
        // coupling line
        if(i>1){ const link = document.createElement('div'); link.className='coupler'; preview.appendChild(link); }
        preview.appendChild(w);
      }
    }
    function setVal(n){
      n = Math.max(1, Math.min(20, n|0));
      display.textContent = n;
      range.value = n;
      hidden.value = n;
      renderPreview(n);
    }
    dec.addEventListener('click', ()=> setVal(parseInt(range.value)-1));
    inc.addEventListener('click', ()=> setVal(parseInt(range.value)+1));
    range.addEventListener('input', ()=> setVal(parseInt(range.value)));
    // init
    setVal(3);
  </script>
  </div>

  <script>
    // selector behavior: choose a wagon count and update hidden field
    const items = document.querySelectorAll('.selector-item');
    const input = document.getElementById('wagons-input');
    const preview = document.getElementById('preview-row');
    function setSelected(n){
      items.forEach(it=>{it.classList.toggle('selected', it.dataset.val==n)});
      input.value = n;
      // render preview wagons
      preview.innerHTML = '';
      for(let i=1;i<=n;i++){
        const w = document.createElement('div'); w.className='wagon';
        const doors = document.createElement('div'); doors.className='doors';
        for(let d=0;d<4;d++){ const dd=document.createElement('div'); dd.className='door'; dd.textContent='C'; doors.appendChild(dd); }
        w.appendChild(doors);
        const foot=document.createElement('div'); foot.style.position='absolute';foot.style.bottom='8px';foot.style.left='12px';foot.style.fontSize='13px';foot.style.color='#555'; foot.textContent='W '+i; w.appendChild(foot);
        preview.appendChild(w);
      }
    }
    items.forEach(it=>it.addEventListener('click',()=>setSelected(it.dataset.val)));
    // default
    setSelected(input.value);
  </script>
  </div>
</body>
</html>
